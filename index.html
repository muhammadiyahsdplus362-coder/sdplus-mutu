<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2a7e78" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SD PLUS MUTU" />
  <title>SD PLUS MUTU</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/sdplus-app-icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/sdplus-app-icon-180.png" />
  <!-- Boot guard: cegah flash layar login saat cold-start jika sudah login -->
  <script>
    (function bootGuard(){
      try {
        var qs = new URLSearchParams(window.location.search);
        if (qs.has('choose') || qs.has('logout')) return; // biarkan login / pilih peran tampil
        var raw = sessionStorage.getItem('siakad_session_user')
               || localStorage.getItem('siakad_session_user');
        if (!raw) return;                                  // belum login -> login tampil normal
        var user = JSON.parse(raw);
        if (!user || !user.id) return;
        var r = String(user.role || '').toLowerCase().replace(/[\s_-]+/g, '');
        var dest = (r === 'guru' || r === 'walikelas') ? 'guru-shell.html'
                 : (r === 'wali' || r === 'walimurid' || r === 'orangtua' || r === 'ortu') ? 'wali-shell.html'
                 : '';
        if (!dest) return;
        // Sembunyikan halaman seketika supaya login tidak sempat berkedip
        document.documentElement.style.visibility = 'hidden';
        window.location.replace(dest);                     // langsung masuk, tanpa nunggu async
      } catch (_) {}
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-mobile.js"></script>
  <script src="native-enhance.js"></script>
  <script src="native-pro.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      color: #0f172a;
      background: linear-gradient(165deg, #FFF3E8 0%, #F8FAFC 45%, #E8F7F5 100%);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    .login-screen {
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
      max-width: 420px;
      margin: 0 auto;
      padding: calc(40px + env(safe-area-inset-top, 0px)) 24px calc(28px + env(safe-area-inset-bottom, 0px));
      overflow: hidden;
    }
    .login-screen::before {
      content: '';
      position: absolute;
      top: -140px; left: 50%;
      transform: translateX(-50%);
      width: 460px; height: 360px;
      background:
        radial-gradient(ellipse at 28% 25%, rgba(254,129,24,.22) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 70%, rgba(0,255,219,.20) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }
    .login-screen > * { position: relative; z-index: 1; }
    .login-hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .login-logo {
      width: 96px;
      height: 96px;
      border-radius: 26px;
      object-fit: contain;
      background: #fff;
      border: 1px solid rgba(226,232,240,.95);
      box-shadow: 0 16px 30px rgba(42,126,120,.20), 0 8px 18px rgba(254,129,24,.14);
    }
    .login-heading {
      margin: 16px 0 0;
      font-size: 26px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -.03em;
      color: #123330;
    }
    .login-sub {
      margin: 6px 0 0;
      color: #64748b;
      font-size: 14px;
      line-height: 1.55;
      max-width: 300px;
    }
    .login-card {
      padding: 22px 20px;
      border-radius: 26px;
      background: #FFFDF9;
      border: 1px solid rgba(254,129,24,.14);
      box-shadow: 0 22px 46px rgba(15,23,42,.08);
      display: grid;
      gap: 16px;
    }
    .login-field { display: grid; gap: 8px; }
    .login-field > span {
      color: #334155;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .01em;
    }
    .login-input-wrap { position: relative; }
    .login-card input {
      width: 100%;
      border: 1px solid rgba(203,213,225,.95);
      border-radius: 15px;
      padding: 14px 46px 14px 15px;
      font-size: 15px;
      outline: none;
      background: #fff;
      color: #0f172a;
      transition: border-color .15s, box-shadow .15s;
    }
    .login-card input::placeholder { color: #94a3b8; }
    .login-card input:focus {
      border-color: rgba(62,171,164,.55);
      box-shadow: 0 0 0 4px rgba(62,171,164,.12);
    }
    .login-eye {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 11px;
      background: #FFF3E8;
      color: #2a7e78;
      cursor: pointer;
      padding: 0;
    }
    .login-eye:active { background: #FFE9D6; }
    .login-message {
      display: none;
      border-radius: 14px;
      padding: 12px 13px;
      background: #E6F7F5;
      border: 1px solid #bfe8e3;
      color: #1f6f68;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
    }
    .login-submit {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #FE8118 0%, #3eaba4 100%);
      box-shadow: 0 14px 28px rgba(254,129,24,.22), 0 10px 22px rgba(62,171,164,.20);
      transition: transform .12s, box-shadow .12s, opacity .12s;
    }
    .login-submit:active { transform: translateY(1px); box-shadow: 0 9px 18px rgba(254,129,24,.18), 0 7px 16px rgba(62,171,164,.16); }
    .login-submit:disabled { opacity: .65; cursor: default; }
    .login-footer {
      margin: 0;
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.6;
    }
    .login-footer strong { color: #64748b; font-weight: 800; }
  </style>

  <style id="desktop-mockup">
    @media (min-width: 480px) {
      html, body {
        height: 100%;
        margin: 0;
        background: #0f172a !important;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse at 30% 20%, rgba(45,53,97,.18) 0%, transparent 55%),
          radial-gradient(ellipse at 70% 80%, rgba(224,164,88,.12) 0%, transparent 55%);
        pointer-events: none;
        z-index: 0;
      }
      .mockup-frame {
        position: relative;
        z-index: 1;
        width: 393px;
        height: 852px;
        border-radius: 54px;
        background: #0f172a;
        box-shadow:
          inset 0 0 0 1px #334155,
          0 0 0 8px #1e293b,
          0 0 0 9px #334155,
          0 50px 100px rgba(0,0,0,.7);
        overflow: hidden;
        flex-shrink: 0;
      }
      .mockup-frame::before {
        content: '';
        position: absolute;
        top: 12px; left: 50%;
        transform: translateX(-50%);
        width: 126px; height: 37px;
        background: #000;
        border-radius: 20px;
        z-index: 200;
      }
      .mockup-frame .login-screen {
        width: 100% !important;
        max-width: 100% !important;
        height: 100%;
        min-height: 100%;
        border-radius: 0 !important;
        overflow-y: auto;
        background: linear-gradient(180deg, #F8FAFC 0%, #f8fafc 60%);
      }
    }
    @media (max-width: 479px) {
      .mockup-frame { display: contents; }
    }
  </style>
</head>
<body>
  <div class="mockup-frame">
    <main class="login-screen">
      <section class="login-hero">
        <img class="login-logo" src="assets/sdplus-app-icon-180.png?v=20260626" alt="Logo SD Plus Zymata" />
        <h1 class="login-heading">Selamat Datang</h1>
        <p class="login-sub">Masuk menggunakan akun sekolah Anda untuk melanjutkan ke aplikasi Zymata.</p>
      </section>

      <section class="login-card" aria-label="Form Login Zymata">
        <label class="login-field">
          <span>Username atau Email</span>
          <input id="loginUsername" type="text" autocomplete="username" placeholder="Masukkan username atau email" />
        </label>
        <label class="login-field">
          <span>Password</span>
          <div class="login-input-wrap">
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Masukkan password" />
            <button type="button" class="login-eye" id="togglePassword" aria-label="Tampilkan password">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </label>
        <div class="login-message" id="loginMessage"></div>
        <button type="button" class="login-submit" id="loginBtn">Masuk</button>
        <button type="button" id="biometricBtn" style="display:none;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:12px;padding:13px;border-radius:14px;border:1.5px solid #2a7e78;background:transparent;color:#2a7e78;font-weight:800;font-size:14px;cursor:pointer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 11v4"/><path d="M7.5 7.5a7 7 0 0 1 9 0"/><path d="M5 10.5a9.5 9.5 0 0 1 .6-3.3"/><path d="M19 10.5a9.5 9.5 0 0 0-.6-3.3"/><path d="M8.5 13.5a5 5 0 0 1 7 0"/><path d="M9 18.5a8 8 0 0 0 6 0"/></svg>
          Masuk dengan Sidik Jari / Face ID
        </button>
      </section>

      <p class="login-footer">Belum punya akun? Hubungi <strong>admin sekolah</strong> Anda.</p>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'zymata-mobile-role-chooser-v1';
    const SESSION_KEY = 'siakad_session_user';
    const BYPASS_AUTO_ROLE = new URLSearchParams(window.location.search).has('choose');

    const loginBtn = document.getElementById('loginBtn');
    const loginMessage = document.getElementById('loginMessage');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const togglePassword = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    const EYE_OPEN = '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>';
    const EYE_OFF = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';

    const roles = {
      guru: { label: 'Guru', target: 'guru-shell.html' },
      wali: { label: 'Wali Murid', target: 'wali-shell.html' }
    };

    function normalizeRole(value) {
      const role = String(value || '').toLowerCase().replace(/[\s_-]+/g, '');
      if (role === 'guru' || role === 'walikelas') return 'guru';
      if (role === 'wali' || role === 'walimurid' || role === 'orangtua' || role === 'ortu') return 'wali';
      return '';
    }

    function readJsonStorage(storage, key) {
      try {
        const raw = storage && storage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function getLoggedRole() {
      const sessionUser = readJsonStorage(sessionStorage, SESSION_KEY) || readJsonStorage(localStorage, SESSION_KEY);
      return normalizeRole(sessionUser && sessionUser.role);
    }

    // Jika sudah login, langsung arahkan ke tampilan sesuai role.
    (function autoRoute() {
      if (BYPASS_AUTO_ROLE) return;
      const role = getLoggedRole();
      if (role && roles[role]) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ role }));
        window.location.replace(roles[role].target);
      }
    })();

    function setMessage(text, type) {
      loginMessage.style.display = 'block';
      if (type === 'error') {
        loginMessage.style.background = '#fef2f2';
        loginMessage.style.borderColor = '#fecaca';
        loginMessage.style.color = '#dc2626';
      } else {
        loginMessage.style.background = '#E6F7F5';
        loginMessage.style.borderColor = '#bfe8e3';
        loginMessage.style.color = '#1f6f68';
      }
      loginMessage.textContent = text;
    }

    if (togglePassword && loginPassword) {
      togglePassword.addEventListener('click', () => {
        const visible = loginPassword.type === 'text';
        loginPassword.type = visible ? 'password' : 'text';
        eyeIcon.innerHTML = visible ? EYE_OPEN : EYE_OFF;
        togglePassword.setAttribute('aria-label', visible ? 'Tampilkan password' : 'Sembunyikan password');
      });
    }

    async function doLogin() {
      const username = String(loginUsername && loginUsername.value || '').trim();
      const password = String(loginPassword && loginPassword.value || '');
      if (!username || !password) {
        setMessage('Isi username/email dan password terlebih dahulu.', 'error');
        return;
      }
      if (!window.ZymataMobileSupabase) {
        setMessage('Koneksi server belum siap. Periksa internet Anda lalu coba lagi.', 'error');
        return;
      }
      try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Memeriksa akun...';
        setMessage('Memeriksa akun...', 'info');
        const result = await window.ZymataMobileSupabase.signIn(username, password);
        const role = normalizeRole(result && result.user && result.user.role);
        if (!role || !roles[role]) {
          throw new Error('Akun ini belum bisa digunakan di aplikasi mobile.');
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ role }));
        setMessage('Login berhasil. Membuka aplikasi...', 'info');
        try {
          if (window.zBiometric && window.zBiometric.enabled) {
            const av = await window.zBiometric.available();
            if (av && av.isAvailable) { await window.zBiometric.save(username, password); }
          }
        } catch (e) {}
        window.location.replace(roles[role].target);
      } catch (error) {
        setMessage(error && error.message ? error.message : 'Login gagal. Periksa kembali akun Anda.', 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Masuk';
      }
    }

    loginBtn.addEventListener('click', doLogin);
    loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
    loginUsername.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

    // ===== Biometric login (sidik jari / Face ID) =====
    (function () {
      const bioBtn = document.getElementById('biometricBtn');
      if (!bioBtn || !window.zBiometric || !window.zBiometric.enabled) return;
      if (window.zBiometric.isEnrolled()) {
        window.zBiometric.available().then(function (r) {
          if (r && r.isAvailable) bioBtn.style.display = 'flex';
        });
      }
      bioBtn.addEventListener('click', function () {
        window.zBiometric.verify('Masuk ke Zymata')
          .then(function () { return window.zBiometric.get(); })
          .then(function (cred) {
            if (cred && cred.username) {
              loginUsername.value = cred.username;
              loginPassword.value = cred.password;
              doLogin();
            }
          })
          .catch(function () { setMessage('Verifikasi biometrik dibatalkan.', 'error'); });
      });
    })();
  </script>
</body>
</html>
