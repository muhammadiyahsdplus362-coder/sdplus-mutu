  <style id="guru-green-transition">
  #appContent.page-enter{ animation:none !important; }
  #appContent.guru-anim-sheet{ animation:guruSheetIn .46s cubic-bezier(.22,1,.36,1) both !important; }
  @keyframes guruSheetIn{ 0%{ opacity:0; transform:translateY(64px); } 60%{ opacity:1; } 100%{ opacity:1; transform:translateY(0); } }
  #appContent.guru-anim-fade{ animation:guruFadeZoom .40s cubic-bezier(.22,1,.36,1) both !important; }

<style id="desktop-mockup">
@media (min-width: 480px) {
  html, body {
    height: 100%;
    margin: 0;
    background: #0f172a !important;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(99,102,241,.18) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(139,92,246,.12) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }
  .mockup-frame {
    position: relative;
    z-index: 1;
    width: 393px;
    height: 852px;
    border-radius: 54px;
    background: #0f172a;
    box-shadow:
      inset 0 0 0 1px #334155,
      0 0 0 8px #1e293b,
      0 0 0 9px #334155,
      0 50px 100px rgba(0,0,0,.7);
    overflow: hidden;
    flex-shrink: 0;
  }
  /* Dynamic island */
  .mockup-frame::before {
    content: '';
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 126px; height: 37px;
    background: #000;
    border-radius: 20px;
    z-index: 200;
  }
  /* side buttons */
  .mockup-frame::after {
    content: '';
    position: absolute;
    top: 160px; right: -4px;
    width: 4px; height: 70px;
    background: #334155;
    border-radius: 0 3px 3px 0;
    z-index: 200;
    box-shadow: 0 90px 0 #334155;
  }
  .mockup-frame #app,
  .mockup-frame > * {
    width: 100% !important;
    max-width: 100% !important;
    height: 100%;
    border-radius: 0 !important;
    box-shadow: none !important;
    overflow: hidden;
  }
}
@media (max-width: 479px) {
  .mockup-frame { display: contents; }
}
</style>

<!-- FIX PERMANEN: matikan mockup desktop (bingkai HP + dynamic island PALSU) saat
     app berjalan sebagai APLIKASI NATIVE (Capacitor/Cordova), di lebar layar berapa pun.
     Sebelumnya mockup ini ikut aktif DI DALAM APK (bukan cuma di browser) kalau lebar
     layar emulator/HP >=480px, dan pil hitam dynamic-island palsunya menutupi sebagian
     status bar OS asli -> jam/ikon tampak "ketutupan". Sekarang mockup SELALU nonaktif
     saat native, apa pun ukuran layarnya. -->
<script>
  (function () {
    try {
      var C = window.Capacitor;
      var isNativeApp = !!(C && (typeof C.isNativePlatform === 'function' ? C.isNativePlatform() : C.isNative)) || !!window.cordova;
      if (isNativeApp) document.documentElement.classList.add('cap-native');
    } catch (e) {}
  })();
</script>
<style id="cap-native-mockup-off">
  html.cap-native, html.cap-native body {
    display: block !important;
    height: auto !important;
    min-height: 100% !important;
    margin: 0 !important;
    background: #0a1020 !important;
    align-items: stretch !important;
    justify-content: flex-start !important;
    overflow: visible !important;
  }
  html.cap-native body::before { content: none !important; display: none !important; }
  /* Bingkai + dynamic island + tombol samping palsu dimatikan total di app native */
  html.cap-native .mockup-frame { display: contents !important; }
</style>

<!-- Boot splash: tutup layar navy kosong saat cold-start sampai konten siap -->
<style id="z-boot-splash-style">
  #zBootSplash{position:fixed;inset:0;z-index:100000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#070c19;transition:opacity .45s ease}
  #zBootSplash.z-hide{opacity:0;pointer-events:none}
  #zBootSplash .z-boot-logo{width:88px;height:88px;border-radius:24px;box-shadow:0 16px 44px rgba(0,0,0,.55)}
  #zBootSplash .z-boot-name{color:#00ffdb;font:800 17px/1.1 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;letter-spacing:-.01em}
  #zBootSplash .z-boot-ring{width:26px;height:26px;border-radius:50%;border:3px solid rgba(0,255,219,.22);border-top-color:#00ffdb;animation:zBootSpin .8s linear infinite}
  @keyframes zBootSpin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){#zBootSplash .z-boot-ring{animation:none}}
</style>
<div id="zBootSplash" role="status" aria-label="Memuat">
  <img class="z-boot-logo" src="assets/sdplus-app-icon-180.png" alt="" />
  <div class="z-boot-name">SD PLUS GURU</div>
  <div class="z-boot-ring"></div>
</div>
<script>
  (function(){
    function setup(){
      var splash=document.getElementById('zBootSplash');
      if(!splash) return;
      var content=document.getElementById('appContent');
      var done=false;
      function hide(){ if(done) return; done=true; splash.classList.add('z-hide'); setTimeout(function(){ if(splash&&splash.parentNode) splash.parentNode.removeChild(splash); },520); }
      if(content&&content.children.length>0){ hide(); return; }
      if(content){ var mo=new MutationObserver(function(){ if(content.children.length>0){ mo.disconnect(); hide(); } }); mo.observe(content,{childList:true}); }
      window.addEventListener('load',function(){ setTimeout(hide,1400); });
      setTimeout(hide,6000);
    }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',setup); else setup();
  })();
</script>

  <script>
  /* Transisi halaman guru: bottom-nav = sheet (naik dari bawah), lainnya = fade+zoom.
     UI murni \u2014 membungkus animateContent tanpa mengubah logika app. */
  (function(){
    var navMode = 'fade';
    document.addEventListener('click', function(e){
      if(!e.target || !e.target.closest) return;
      if(e.target.closest('.bottom-nav .nav-item[data-tab]')){ navMode = 'sheet'; return; }
      if(e.target.closest('[data-module-route],[data-route],[data-action],[data-primary-action]')){ navMode = 'fade'; }
    }, true);
    function applyGuruAnim(){
      var el = document.getElementById('appContent');
      if(!el) return;
      el.classList.remove('guru-anim-sheet','guru-anim-fade');
      void el.offsetWidth;
      el.classList.add(navMode === 'sheet' ? 'guru-anim-sheet' : 'guru-anim-fade');
    }
    function install(){
      var orig = window.animateContent;
      window.animateContent = function(){
        try { if (typeof orig === 'function') orig.apply(this, arguments); } catch(_){ }
        applyGuruAnim();
      };
    }
    if (window.animateContent) install();
    else window.addEventListener('load', install);
  })();
  </script>
