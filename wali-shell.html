<style id="desktop-mockup">
@media (min-width: 480px) {
  html, body {
    height: 100%;
    margin: 0;
    background: #0f172a !important;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(99,102,241,.18) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(139,92,246,.12) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }
  .mockup-frame {
    position: relative;
    z-index: 1;
    width: 393px;
    height: 852px;
    border-radius: 54px;
    background: #0f172a;
    box-shadow: inset 0 0 0 1px #334155, 0 0 0 8px #1e293b, 0 0 0 9px #334155, 0 50px 100px rgba(0,0,0,.7);
    overflow: hidden;
    flex-shrink: 0;
  }
  .mockup-frame::before {
    content: '';
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 126px; height: 37px;
    background: #000;
    border-radius: 20px;
    z-index: 200;
  }
  .mockup-frame #app,
  .mockup-frame > * {
    width: 100% !important;
    max-width: 100% !important;
    height: 100%;
    border-radius: 0 !important;
    box-shadow: none !important;
    overflow: hidden;
  }
}
@media (max-width: 479px) { .mockup-frame { display: contents; } }

  /* ZYMATA WALI FEED CARD UI */
  .feed-card {
    background: rgba(255,255,255,.98);
    border: 1px solid rgba(226,232,240,.9);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 4px 16px -4px rgba(15,23,42,.03);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .feed-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .feed-time {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .feed-time.purple { color: #9333ea; }
  .feed-time.indigo { color: #4f46e5; }
  .feed-time.green { color: #16a34a; }
  .feed-time.gold { color: #ca8a04; }
  .feed-time.blue { color: #2563eb; }
  .feed-time.red { color: #dc2626; }
  .feed-time.orange { color: #ea580c; }
  .feed-status {
    font-size: 10px;
    font-weight: 900;
    padding: 4px 8px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .feed-status.purple { background: #faf5ff; color: #9333ea; }
  .feed-status.indigo { background: #eef2ff; color: #4f46e5; }
  .feed-status.green { background: #f0fdf4; color: #16a34a; }
  .feed-status.gold { background: #fefce8; color: #ca8a04; }
  .feed-status.blue { background: #eff6ff; color: #2563eb; }
  .feed-status.red { background: #fef2f2; color: #dc2626; }

  .feed-body {

    font-size: 13px;

  /* Mobile: sembunyikan fake statusbar */
  @media (max-width: 479px) {
    #androidStatusBar {
      height:0!important; min-height:0!important;
      overflow:hidden!important; visibility:hidden!important;
      padding:0!important; margin:0!important;
    }
  }

  /* =================================================================
     FIX 29 Juni 2026 (INLINE) — Bottom nav: tombol tengah di TENGAH &
     terangkat, 5 tombol lain sejajar. Ditaruh inline agar tidak terkena
     cache service worker pada guru-shell.css.
     ================================================================= */
  body.wali-shell .bottom-nav {
    display: flex !important;
    grid-template-columns: none !important;
    flex-direction: row !important;
    align-items: flex-end !important;
    justify-content: space-between !important;
    gap: 0 !important;
    overflow: visible !important;
  }
  body.wali-shell .bottom-nav .nav-group {
    display: flex !important;
    flex: 1 1 0 !important;
    min-width: 0 !important;
    align-items: flex-end !important;
    justify-content: space-around !important;
    gap: 2px !important;
  }
  body.wali-shell .bottom-nav .nav-group .nav-item {
    display: flex !important;
    flex: 1 1 0 !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    min-width: 0 !important;
    min-height: 52px !important;
    padding: 6px 0 !important;
    gap: 3px !important;
  }
  /* Label tidak boleh terpotong (hapus ellipsis) + dikecilkan agar 3 tab kanan muat penuh */
  body.wali-shell .bottom-nav .nav-group .nav-item .nav-label {
    display: block !important;
    max-width: none !important;
    overflow: visible !important;
    text-overflow: clip !important;
    white-space: nowrap !important;
    font-size: 8.5px !important;
    letter-spacing: -0.01em !important;
    line-height: 1.15 !important;
    text-transform: none !important;
  }
  body.wali-shell .bottom-nav .nav-group .nav-item .nav-icon svg {
    width: 20px !important;
    height: 20px !important;
  }
  body.wali-shell .bottom-nav .nav-item--center {
    flex: 0 0 auto !important;
    width: 62px !important;
    height: 62px !important;
    margin: 0 8px !important;
    align-self: center !important;
    transform: translateY(-22px) !important;
    border-radius: 50% !important;
    border: 4px solid #F8FAFC !important;
    color: #fff !important;
    background: linear-gradient(135deg, #2D3561 0%, #1A1F36 100%) !important;
    box-shadow: 0 16px 30px -8px rgba(26,31,54,.55) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
  }
  body.wali-shell .bottom-nav .nav-item--center:active {
    transform: translateY(-22px) scale(.94) !important;
  }
  body.wali-shell .bottom-nav .nav-item--center svg {
    width: 26px !important;
    height: 26px !important;
    stroke-width: 2.2 !important;
  }
  body.wali-shell .bottom-nav .nav-item--center .nav-icon {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
  }
  body.wali-shell .bottom-nav .nav-item--center .nav-label { display: none !important; }

  /* ===== v3 (29 Juni 2026): 5 tab sejajar rata + tombol MENU melayang modern
     tepat di tengah / di atas tab Mutabaah ===== */
  body.wali-shell .bottom-nav {
    position: absolute !important;
    display: grid !important;
    grid-template-columns: repeat(5, 1fr) !important;
    align-items: end !important;
    justify-items: stretch !important;
    gap: 0 !important;
    overflow: visible !important;
  }
  body.wali-shell .bottom-nav > .nav-item:not(.nav-item--center) {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    width: 100% !important;
    min-width: 0 !important;
    min-height: 54px !important;
    padding: 7px 0 !important;
    gap: 4px !important;
  }
  body.wali-shell .bottom-nav > .nav-item:not(.nav-item--center) .nav-label {
    display: block !important;
    max-width: none !important;
    overflow: visible !important;
    text-overflow: clip !important;
    white-space: nowrap !important;
    font-size: 9px !important;
    letter-spacing: -0.01em !important;
    line-height: 1.15 !important;
    text-transform: none !important;
  }
  body.wali-shell .bottom-nav > .nav-item:not(.nav-item--center) .nav-icon svg {
    width: 21px !important;
    height: 21px !important;
  }
  /* Tombol MENU = FAB melayang di tengah, di atas Mutabaah */
  body.wali-shell .bottom-nav .nav-item--center {
    position: absolute !important;
    left: 50% !important;
    top: 0 !important;
    transform: translate(-50%, -90%) !important;
    width: 60px !important;
    height: 60px !important;
    margin: 0 !important;
    padding: 0 !important;
    min-height: 0 !important;
    flex: 0 0 auto !important;
    border-radius: 50% !important;
    border: 5px solid #FFFFFF !important;
    color: #fff !important;
    background: linear-gradient(145deg, #2D3561 0%, #1A1F36 100%) !important;
    box-shadow: 0 14px 26px -6px rgba(26,31,54,.45), 0 3px 8px rgba(26,31,54,.22) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    z-index: 60 !important;
    transition: transform .18s ease, box-shadow .18s ease !important;
  }
  body.wali-shell .bottom-nav .nav-item--center:hover {
    transform: translate(-50%, -96%) !important;
    box-shadow: 0 18px 32px -6px rgba(26,31,54,.5) !important;
  }
  body.wali-shell .bottom-nav .nav-item--center:active {
    transform: translate(-50%, -86%) scale(.95) !important;
  }
  body.wali-shell .bottom-nav .nav-item--center svg {
    width: 26px !important;
    height: 26px !important;
    stroke-width: 2.2 !important;
  }
  body.wali-shell .bottom-nav .nav-item--center .nav-icon {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
  }
  body.wali-shell .bottom-nav .nav-item--center .nav-label { display: none !important; }
  /* Ruang ekstra agar konten tidak ketutup FAB */
  body.wali-shell .app-content { padding-bottom: calc(106px + env(safe-area-inset-bottom, 0px)) !important; }

  /* ===== v4 POLISH (modern · mewah · minimalis) ===== */
  /* Bar: kaca buram premium, ringan & tidak kaku */
  body.wali-shell .bottom-nav {
    background: rgba(255,255,255,0.80) !important;
    -webkit-backdrop-filter: blur(24px) saturate(165%) !important;
    backdrop-filter: blur(24px) saturate(165%) !important;
    border-top: 1px solid rgba(255,255,255,0.92) !important;
    border-radius: 30px 30px 0 0 !important;
    box-shadow: 0 -14px 36px -16px rgba(26,31,54,0.22) !important;
    padding-top: 11px !important;
  }
  /* Tab non-aktif: lembut & minimalis */
  body.wali-shell .bottom-nav > .nav-item:not(.nav-item--center) {
    position: relative !important;
    background: transparent !important;
    color: #9aa6b8 !important;
    border-radius: 16px !important;
    transition: color .22s ease, transform .22s ease !important;
  }
  body.wali-shell .bottom-nav > .nav-item:not(.nav-item--center) .nav-icon svg {
    stroke-width: 1.8 !important;
    transition: transform .22s ease !important;
  }
  body.wali-shell .bottom-nav > .nav-item:not(.nav-item--center) .nav-label {
    font-weight: 600 !important;
    color: inherit !important;
  }
  /* Tab aktif: warna aksen + indikator titik halus (bukan kotak) */
  body.wali-shell .bottom-nav > .nav-item.is-active:not(.nav-item--center) {
    background: transparent !important;
    color: #0FB5C4 !important;
  }
  body.wali-shell .bottom-nav > .nav-item.is-active:not(.nav-item--center) .nav-label {
    color: #0FB5C4 !important;
    font-weight: 800 !important;
  }
  body.wali-shell .bottom-nav > .nav-item.is-active:not(.nav-item--center) .nav-icon svg {
    transform: translateY(-1px) scale(1.08) !important;
  }
  body.wali-shell .bottom-nav > .nav-item.is-active:not(.nav-item--center)::before {
    content: "" !important;
    position: absolute !important;
    top: 4px !important;
    left: 50% !important;
    width: 16px !important;
    height: 3px !important;
    border-radius: 3px !important;
    background: #0FB5C4 !important;
    transform: translateX(-50%) !important;
  }
  /* FAB Menu: glossy navy + glow aksen, mewah */
  body.wali-shell .bottom-nav .nav-item--center {
    width: 62px !important;
    height: 62px !important;
    border: 4px solid #ffffff !important;
    background:
      radial-gradient(120% 120% at 30% 22%, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0) 46%),
      linear-gradient(150deg, #2B3566 0%, #1A1F36 72%) !important;
    box-shadow:
      0 18px 32px -10px rgba(26,31,54,0.55),
      0 6px 16px -4px rgba(15,181,196,0.32),
      0 0 0 6px rgba(15,181,196,0.07) !important;
  }
  body.wali-shell .bottom-nav .nav-item--center svg {
    stroke-width: 2 !important;
  }

  /* ===== v5: tombol Menu MENYATU dengan bar (docked / notch) ===== */
  /* PENTING: tetap absolute agar bar nempel di bawah (jangan relative!) */
  body.wali-shell .bottom-nav {
    position: absolute !important;
    overflow: visible !important;
    background: rgba(255,255,255,0.92) !important;
  }
  /* Tonjolan/cradle: permukaan bar naik memeluk tombol */
  body.wali-shell .bottom-nav::before {
    content: "" !important;
    position: absolute !important;
    left: 50% !important;
    top: -22px !important;
    transform: translateX(-50%) !important;
    width: 74px !important;
    height: 42px !important;
    background: rgba(255,255,255,0.92) !important;
    -webkit-backdrop-filter: blur(24px) saturate(165%) !important;
    backdrop-filter: blur(24px) saturate(165%) !important;
    border-radius: 50% !important;
    box-shadow: 0 -7px 16px -9px rgba(26,31,54,0.16) !important;
    z-index: 0 !important;
    pointer-events: none !important;
  }
  /* Tab & ikon tampil di atas tonjolan */
  body.wali-shell .bottom-nav > .nav-item:not(.nav-item--center) {
    z-index: 1 !important;
  }
  /* FAB duduk menyatu di atas tonjolan (tanpa bingkai mengambang) */
  body.wali-shell .bottom-nav .nav-item--center {
    width: 60px !important;
    height: 60px !important;
    border: none !important;
    transform: translate(-50%, -84%) !important;
    background:
      radial-gradient(120% 120% at 30% 22%, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0) 46%),
      linear-gradient(150deg, #2B3566 0%, #1A1F36 72%) !important;
    box-shadow:
      0 11px 20px -8px rgba(26,31,54,0.45),
      0 0 0 5px rgba(15,181,196,0.06) !important;
  }

  /* ===== v6 (29 Juni): Mutabaah dihapus dari navi. Menu jadi item TENGAH
     (di dalam bar), diturunkan & menyatu — modern profesional ===== */
  body.wali-shell .bottom-nav .nav-item--center {
    position: relative !important;
    left: auto !important;
    top: auto !important;
    transform: translateY(-18px) !important;
    justify-self: center !important;
    align-self: center !important;
    margin: 0 auto !important;
    width: 58px !important;
    height: 58px !important;
    min-height: 0 !important;
    padding: 0 !important;
    border: none !important;
    border-radius: 50% !important;
    z-index: 5 !important;
    background:
      radial-gradient(120% 120% at 30% 22%, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0) 46%),
      linear-gradient(150deg, #2B3566 0%, #1A1F36 72%) !important;
    box-shadow:
      0 10px 18px -7px rgba(26,31,54,0.42),
      0 0 0 5px rgba(15,181,196,0.06) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
  }
  body.wali-shell .bottom-nav .nav-item--center:hover {
    transform: translateY(-22px) !important;
    box-shadow: 0 14px 24px -7px rgba(26,31,54,0.48) !important;
  }
  body.wali-shell .bottom-nav .nav-item--center:active {
    transform: translateY(-15px) scale(0.95) !important;
  }
  body.wali-shell .bottom-nav .nav-item--center svg {
    width: 24px !important;
    height: 24px !important;
    stroke-width: 2 !important;
  }
  body.wali-shell .bottom-nav .nav-item--center .nav-label { display: none !important; }
  /* Tonjolan/notch disesuaikan untuk tombol yang lebih rendah */
  body.wali-shell .bottom-nav::before {
    top: -18px !important;
    width: 70px !important;
    height: 38px !important;
  }
  /* Ruang konten dikurangi karena tombol lebih rendah */
  body.wali-shell .app-content { padding-bottom: calc(92px + env(safe-area-inset-bottom, 0px)) !important; }
</style>

<script>
(function(){
  var isCapacitor = !!(window.Capacitor || window.cordova || window.PhoneGap);
  var isMobile = isCapacitor || screen.width <= 479;
  if(isMobile){
    document.addEventListener('DOMContentLoaded', function(){
      var bar = document.getElementById('androidStatusBar');
      if(bar) bar.style.cssText = 'height:0!important;min-height:0!important;overflow:hidden!important;visibility:hidden!important;padding:0!important;margin:0!important;';
    });
  }
})();
</script>

<style id="wali-orange-reskin">
/* ===========================================================
   ZYMATA WALI — RESKIN SMART LEARN (oranye + krem)
   Semua di-scope ke body.wali-shell agar TIDAK mengubah role
   guru (guru-shell.css dipakai bersama). UI only; fungsi utuh.
   =========================================================== */
body.wali-shell{ --w-orange:#FE8118; --w-orange-deep:#F95E08; --w-cream:#FBF8F1; }

/* Latar krem hangat (menang atas #f9fafb dari renderHome via specificity body.wali-shell) */
body.wali-shell{ background:#FBF8F1 !important; }

/* HERO oranye (markup memakai .guru-dash-hero) */
body.wali-shell .guru-dash-hero{
  background:linear-gradient(135deg,#FE8118 0%,#F95E08 100%) !important;
  box-shadow:0 18px 34px -10px rgba(249,94,8,.42) !important;
}
body.wali-shell .guru-dash-hero::after{
  content:"" !important; position:absolute !important;
  right:-40px; top:-48px; width:172px; height:172px;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.30), rgba(255,255,255,0) 70%) !important;
  border-radius:50% !important; pointer-events:none !important; z-index:0 !important;
}
body.wali-shell .guru-dash-hero > *{ position:relative !important; z-index:1 !important; }

/* Header dirapikan: eyebrow "Ananda" + nama lebih ringkas */
body.wali-shell .guru-dash-hero .gdh-name{
  font-size:23px !important; font-weight:800 !important;
  letter-spacing:-.02em !important; line-height:1.15 !important; margin:0 0 8px !important;
}
body.wali-shell .guru-dash-hero .gdh-name::before{
  content:"Ananda" !important; display:block !important;
  font-size:11px !important; font-weight:800 !important; letter-spacing:.08em !important;
  text-transform:uppercase !important; color:rgba(255,255,255,.82) !important; margin-bottom:3px !important;
}

/* FAB tengah (Menu) → oranye (override semua aturan navy di atas) */
body.wali-shell .bottom-nav .nav-item--center{
  background:
    radial-gradient(120% 120% at 30% 22%, rgba(255,255,255,.26) 0%, rgba(255,255,255,0) 46%),
    linear-gradient(150deg,#FE8118 0%,#F95E08 74%) !important;
  box-shadow:0 12px 22px -7px rgba(249,94,8,.50), 0 0 0 5px rgba(254,129,24,.10) !important;
}

/* Tab aktif → oranye (sebelumnya teal #0FB5C4) */
body.wali-shell .bottom-nav > .nav-item.is-active:not(.nav-item--center),
body.wali-shell .bottom-nav > .nav-item.is-active:not(.nav-item--center) .nav-label{ color:#F95E08 !important; }
body.wali-shell .bottom-nav > .nav-item.is-active:not(.nav-item--center)::before{ background:#F95E08 !important; }

/* Link "Lihat semua" → oranye */
body.wali-shell .lux-link{ color:#F95E08 !important; }
body.wali-shell .lux-link:hover{ color:#C2410C !important; }

/* ===== TRANSISI HALAMAN =====
   bottom-nav → naik dari bawah (sheet); lainnya → fade+zoom.
   Digerakkan kelas wali-anim-* dari skrip di bawah; matikan page-enter agar tak dobel. */
body.wali-shell .app-content.page-enter{ animation:none !important; }
body.wali-shell .app-content.wali-anim-sheet{ animation:waliSheetIn .46s cubic-bezier(.22,1,.36,1) both !important; }
@keyframes waliSheetIn{ 0%{ opacity:0; transform:translateY(64px); } 60%{ opacity:1; } 100%{ opacity:1; transform:translateY(0); } }
body.wali-shell .app-content.wali-anim-fade{ animation:waliFadeZoom .40s cubic-bezier(.22,1,.36,1) both !important; }
@keyframes waliFadeZoom{ 0%{ opacity:0; transform:scale(1.06); } 100%{ opacity:1; transform:scale(1); } }

/* ===== KARTU TABUNGAN / FINANCE \u2014 gaya Smart Learn pastel =====
   Baris 1 (tanpa inline style): kartu-1 SPP=teal, kartu-2 Tabungan Anak=mint.
   Baris 2 (punya inline style grid 1fr): Tabungan Umum=krem + ikon lavender. */
body.wali-shell .lux-fin-row:not([style]) .lux-fin:nth-child(1){
  background:#D2E4E2 !important; border:none !important;

  <script>
  /* Transisi halaman wali: bottom-nav = sheet (naik dari bawah), lainnya = fade+zoom.
     UI murni — membungkus animateWaliContent tanpa mengubah logika app. */
  (function(){
    var navMode = 'fade';
    document.addEventListener('click', function(e){
      if(!e.target || !e.target.closest) return;
      if(e.target.closest('.bottom-nav .nav-item[data-tab]')){ navMode = 'sheet'; return; }
      if(e.target.closest('[data-module-route],[data-route],[data-action],[data-primary-action]')){ navMode = 'fade'; }
    }, true);
    function applyWaliAnim(){
      var el = document.getElementById('appContent');
      if(!el) return;
      el.classList.remove('wali-anim-sheet','wali-anim-fade');
      void el.offsetWidth;
      el.classList.add(navMode === 'sheet' ? 'wali-anim-sheet' : 'wali-anim-fade');
    }
    function install(){
      var orig = window.animateWaliContent;
      window.animateWaliContent = function(){
        try { if (typeof orig === 'function') orig.apply(this, arguments); } catch(_){ }
        applyWaliAnim();
      };
    }
    if (window.animateWaliContent) install();
    else window.addEventListener('load', install);
  })();
  </script>
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./guru-sw.js').catch(function () {});
      });
    }
  </script>
